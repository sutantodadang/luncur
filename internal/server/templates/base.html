{{define "head"}}
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>luncur</title>
<link rel="stylesheet" href="/ui/static/app.css?v={{v}}">
<script src="/ui/static/htmx.min.js?v={{v}}" defer></script>
</head>
<body hx-boost="true" class="bg-slate-950 text-slate-300 min-h-screen antialiased">
<div class="flex min-h-screen">
{{end}}

{{define "nav"}}
<aside class="flex w-56 flex-col gap-1 border-r border-slate-800 p-4">
  <a href="/ui/" class="mb-4 text-lg font-semibold text-white">luncur</a>
  <a href="/ui/" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Projects</a>
  <a href="/ui/tokens" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Tokens</a>
  <a href="/ui/sshkeys" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">SSH keys</a>
  {{if .IsAdmin}}
  <a href="/ui/audit" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Audit</a>
  <a href="/ui/users" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Users</a>
  <a href="/ui/backups" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Backups</a>
  <a href="/ui/settings" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Settings</a>
  <a href="/ui/doctor" class="block rounded-md px-3 py-1.5 text-sm hover:bg-slate-800 hover:text-white">Doctor</a>
  {{end}}
  <div class="mt-auto flex flex-col gap-2">
    <span class="truncate text-xs text-slate-500">{{.User.Email}}</span>
    <form method="post" action="/ui/logout">
      <input type="hidden" name="_csrf" value="{{.CSRF}}">
      <button type="submit" class="btn-ghost w-full">log out</button>
    </form>
  </div>
</aside>
<main class="max-w-5xl flex-1 p-8">
{{end}}

{{define "foot"}}
</main>
</div>
</body>
</html>
{{end}}
