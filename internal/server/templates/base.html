  <div class="mt-auto flex flex-col gap-2">
    <a href="/ui/account" class="truncate text-xs text-mut hover:text-inkhi">{{.User.Email}}</a>
    <button type="button" id="theme-toggle" class="btn-ghost w-full font-mono text-[11px]"></button>
    <form method="post" action="/ui/logout">
      <input type="hidden" name="_csrf" value="{{.CSRF}}">
      <button type="submit" class="btn-ghost w-full">log out</button>
    </form>
  </div>
</aside>
<script>
(function(){
  var btn = document.getElementById("theme-toggle");
  if(!btn) return;
  function label(){
    btn.textContent = "theme: " + (document.documentElement.dataset.theme === "light" ? "light" : "dark");
  }
  label();
  btn.addEventListener("click", function(){
    var next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
    document.documentElement.dataset.theme = next;
    localStorage.setItem("luncur-theme", next);
    label();
  });
})();
</script>
<main class="min-w-0 flex-1 p-8">
<div class="mx-auto w-full max-w-6xl 2xl:max-w-[1600px]">
<div id="hx-err" hidden class="card mb-4 border-fail text-[13px]"></div>
{{end}}

{{define "foot"}}
</div>
</main>
</div>
<script>
// hx-boost swaps body innerHTML, so this script re-runs on every boosted
// navigation while the body node (and its listeners) survives. Element
// lookups happen at event time (swapped-in nodes replace old ones), the
// toast stack re-attaches itself if its node was swapped away, and listener
// registration runs exactly once per real page load via window.__luncurUX.

// Toast stack: window.toast(msg, kind) creates a bottom-right toast that
// auto-dismisses after 4s. kind is "ok" or "err" — never orange (accent
// discipline, see DESIGN.md Motion).
window.toast = function(msg, kind){
  var wrap = document.querySelector(".toast-wrap");
  if(!wrap || !wrap.isConnected){
    wrap = document.createElement("div");
    wrap.className = "toast-wrap";
    document.body.appendChild(wrap);
  }
  var el = document.createElement("div");
  el.className = "toast " + (kind === "err" ? "toast-err" : "toast-ok");
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){
    el.classList.add("fade-out");
    setTimeout(function(){ el.remove(); }, 150);
  }, 4000);
};

if(!window.__luncurUX){
  window.__luncurUX = true;
  document.body.addEventListener("htmx:responseError", function(e){
    var el = document.getElementById("hx-err");
    if(el){
      el.hidden = false;
      el.textContent = "request failed (" + e.detail.xhr.status + "): " + (e.detail.xhr.responseText || "").slice(0,300);
    }
    window.toast("request failed (" + e.detail.xhr.status + ")", "err");
  });
  document.body.addEventListener("htmx:sendError", function(){
    var el = document.getElementById("hx-err");
    if(el){ el.hidden = false; el.textContent = "network error — server unreachable"; }
    window.toast("network error", "err");
  });

  // Global request bar: an indeterminate sweep shown only for hx-boosted
  // navigations (never background polls — those set hx-trigger="every ..."
  // and are never boosted), so the 15s chart/table refreshes stay silent.
  var setBar = function(on){
    var bar = document.getElementById("hx-bar");
    if(bar) bar.classList.toggle("on", on);
  };
  document.body.addEventListener("htmx:beforeRequest", function(e){
    if(e.detail.boosted) setBar(true);
  });
  ["htmx:afterRequest", "htmx:responseError", "htmx:sendError"].forEach(function(ev){
    document.body.addEventListener(ev, function(e){
      if(e.detail.boosted) setBar(false);
    });
  });

  // Preserve scroll on in-place actions: an action button (env set/unset,
  // redeploy, scale, save health, ...) POSTs and the server redirects back to
  // the SAME page. hx-boost then swaps the body and htmx scrolls to top —
  // jarring when you clicked a control halfway down. Snapshot the scroll
  // position before a boosted request and, if we land on the same URL,
  // restore it. A real navigation to a different page keeps the top scroll.
  var scrollSnap = null;
  document.body.addEventListener("htmx:beforeRequest", function(e){
    if(e.detail.boosted){ scrollSnap = { path: location.pathname + location.search, y: window.scrollY }; }
  });
  document.body.addEventListener("htmx:afterSettle", function(e){
    var s = scrollSnap; scrollSnap = null;
    if(e.detail.boosted && s && (location.pathname + location.search) === s.path){ window.scrollTo(0, s.y); }
  });
}

// Flash cookie ("luncur_flash", "<kind>|<msg>"): the server queues one toast
// for the next page render; read + cleared on every run so boosted
// redirects show it too.
(function(){
  var m = document.cookie.match(/(?:^|; )luncur_flash=([^;]*)/);
  if(m){
    document.cookie = "luncur_flash=; Max-Age=0; path=/";
    var parts = decodeURIComponent(m[1]).split("|");
    var kind = parts.shift();
    window.toast(parts.join("|"), kind);
  }
})();
</script>
</body>
</html>
{{end}}
